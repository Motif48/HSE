<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
</head>

<body>

<h2>Place Your Order</h2>

<form id="orderForm">
  <input type="text" id="name" placeholder="Your Name" required>
  <input type="tel" id="phone" placeholder="Phone Number" required>

  <select id="food">
    <option>Pilau</option>
    <option>Chicken Fry</option>
    <option>Ugali + Beef</option>
    <option>Chapati + Beans</option>
  </select>

  <input type="number" id="quantity" placeholder="Quantity" required>

  <select id="delivery">
    <option value="pickup">Pickup</option>
    <option value="delivery">Delivery</option>
  </select>

  <input type="text" id="location" placeholder="Delivery Location (if delivery)">

  <button type="submit">Place Order</button>
</form>

<br>
<a href="https://wa.me/254111994579?text=Hello%20I%20want%20to%20order" 
class="btn" 
style="display:block; margin:20px auto; width:200px;">
💬 Order via WhatsApp
</a>


<script>
// 🔥 ADD YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT",
  projectId: "YOUR_PROJECT"
};

document.getElementById("orderForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const food = document.getElementById("food").value;
  const quantity = document.getElementById("quantity").value;
  const delivery = document.getElementById("delivery").value;
  const location = document.getElementById("location").value;

  // 🧾 Create message
  let message = `🍽️ *New Order - Heaven's Spice Eateries*%0A
👤 Name: ${name}%0A
📞 Phone: ${phone}%0A
🍛 Food: ${food}%0A
🔢 Quantity: ${quantity}%0A
🚚 Delivery: ${delivery}%0A`;

  if(delivery === "delivery"){
    message += `📍 Location: ${location}%0A`;
  }

  // 💬 WhatsApp number
  const whatsappNumber = "254111994579";

  // 🚀 Open WhatsApp
  const url = `https://wa.me/${whatsappNumber}?text=${message}`;
  window.open(url, "_blank");
});
</script>
<div id="cart"></div>

<script>
function showCart(){
  let html = "";
  let total = 0;

  cart.forEach(c=>{
    html += `<p>${c.item} - ${c.price}</p>`;
    total += c.price;
  });

  html += `<h3>Total: KES ${total}</h3>`;
  document.getElementById("cart").innerHTML = html;
}
</script>
</body>
</html>
